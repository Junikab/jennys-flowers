<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jenny's Flowers</title>
    <script>
        // Redirect to the index.html with the proper URL segments
        const redirectPath = window.location.pathname.slice(1)
        const redirectQuery = window.location.search
        const redirectHash = window.location.hash
        const redirectTarget = redirectPath + redirectQuery + redirectHash
        window.location.replace('/?redirect=' + encodeURIComponent(redirectTarget))
    </script>
</head>
<body>
    Redirecting...
</body>
</html>
